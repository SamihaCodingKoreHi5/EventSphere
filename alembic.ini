# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(year)d_%%(month)02d_%%(day)02d_%%(hour)02d%%(minute)02d-%%(rev)s_%%(slug)s

# sys.path path, used to find modules
prepend_sys_path = .

# timezone to use when rendering the date
# timezone =

# max length of characters to truncate the migration character
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded
# from sys.path
# version_locations = %(here)s/bar:%(here)s/bat

# version path separator; defaults to "os.pathsep".
# Use a space to span multiple lines on window/unix
# version_path_separator = :

# set to 'true' to search for newer versions in the
# version_locations; defaults to 'false'
# check_current_revision = false


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter:generic]
format = %(asctime)s [%(name)s] %(levelname)s: %(message)s
datefmt = %H:%M:%S
